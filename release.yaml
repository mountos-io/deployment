# mountOS deploy — release manifest.
# ONE version pins the whole bundle (deploy templates + server binary + SDK +
# helpers) so a client install is internally coherent. The release pipeline
# builds/publishes every artifact below at this version; the AI deploy skill
# reads this file to fetch the matching set. The vendor's internal CI rehearses
# each tagged version before it is published.

version: 0.88.0

artifacts:
  # Hub server binary, fetched on each instance via https://n.sh.
  appserv:
    pkg: mountos-appserv
    # REQUIRED build tags. `hublicense` switches the hub to DB-driven licensing:
    # no MOS_LICENSE_PATH, built-in free 5 TiB default, license managed via the
    # admin DB/SDK. A file-gate build (WITHOUT hublicense) FATALLY EXITS at boot
    # in this deployment model (cloud-init sets no license file). The release
    # pipeline MUST build appserv with these tags for the deploy bundle.
    build_tags: [defaultserv, dbserv, strict, appserv, hublicense]

  # Admin SDK module used by the verify smoke (resolved from the Go module proxy).
  admin_sdk:
    module: github.com/mountos-io/mountos-admin-sdk/go

  # Operator helpers — shipped prebuilt so clients need NO Go toolchain. The
  # scripts prefer these on PATH and fall back to `go run` for in-repo dev.
  # (Longer-term alternative: fold into `appserv keygen` / `appserv verify`.)
  keygen:
    pkg: mos-keygen
    source: bootstrap/keygen
  verify:
    pkg: mos-verify
    source: verify

# Cloud demarcation. Each cloud's substrate is self-contained under
# clouds/<cloud>/terraform and selected via `CLOUD=<cloud> make ...`.
#
# VERIFICATION LEVELS DIFFER BY CLOUD: AWS is Floci-plan-verified (a local AWS
# API emulator lets `terraform plan` run against a full graph without a real
# account — see mountos-overview/deploy-floci-test/). GCP and Azure have no
# equivalent local emulator, so they are validated at `terraform validate` +
# tflint (schema/syntax-level) only — graph-correct but PLAN-UNPROVEN and
# RUNTIME-UNPROVEN until exercised against a real project/subscription. Both
# also have a documented parity gap vs AWS's RDS manage_master_user_password:
# their DB master password is a Terraform value (random_password), not
# platform-managed — see each cloud's rds.tf.
clouds:
  aws:
    terraform: clouds/aws/terraform
  gcp:
    terraform: clouds/gcp/terraform
  azure:
    terraform: clouds/azure/terraform

# Distribution:
#   source of truth  : the mountos-io/deployment git repo, tagged v<version>.
#   published bundle : n.sh / R2 as `--pkg deploy --version <version>` (tarball).
#   AI deploy skill  : fetches the pinned bundle (tarball or repo tag), drives make.

# Production-hardening register (updated after the production-readiness review).
# status:
#   resolved        = applied + terraform-validate clean. RUNTIME-PENDING: not yet
#                     exercised on a live AWS bring-up — validate proves HCL,
#                     not boot behavior. Verify on first real deploy.
#   partial         = mechanism in place; a further step remains.
#   open-needs-runtime = NOT shipped: unsafe to apply blind (total blast radius) +
#                     untestable here. Implement during a runtime-validated session.
#   open-pipeline   = depends on the release pipeline (cannot fabricate here).
production_hardening:
  - id: vault-tls
    severity: critical
    status: resolved
    note: "SUPERSEDED BY REMOVAL of the self-hosted Vault node (see vault-bsl-posture). The surviving mechanism covers byo (hashicorp) Vaults only: private-CA Vaults get their operator-supplied CA published by Terraform and fetched in the unit's ExecStartPre (self-healing, non-zero exit until valid); public-CA Vaults use system roots; vault_addr must be https://. Cloud-native mode has no Vault TLS surface at all (SDK-native TLS to the platform store)."
  - id: secret-id-in-user-data
    severity: critical
    status: resolved
    note: "secret_id moved to SSM SecureString; fetched via the instance role (ssm:GetParameter + kms:Decrypt-via-ssm) in the unit's ExecStartPre (not baked into user_data). ExecStartPre writes it to a 0600 secret.env (optional EnvironmentFile) and exits non-zero until the param exists, so a secret_id published after boot self-heals on the next systemd restart. RUNTIME-PENDING. (Still passes through tfstate — see state-secrets-backend.)"
  - id: alb-reencrypt
    severity: high
    status: resolved
    note: "appserv serves HTTPS:8443 (self-signed via cloud-init); ALB target group + health check are HTTPS (ALB skips backend cert check). Health matcher broadened to 200-499. RUNTIME-PENDING."
  - id: state-secrets-backend
    severity: high
    status: partial
    note: "make plan/apply now fail unless backend.tf exists (enforces remote state). RDS master passwords (admin + region) are now AWS-managed via manage_master_user_password — never a Terraform value, so they no longer land in tfstate; seed-vault.sh/region-seed.sh fetch them from Secrets Manager at seed time and build the DSN themselves. byo DSNs are likewise never Terraform values: the admin_db_url/region_db_url variables and outputs were REMOVED — the operator supplies ADMIN_DB_URL/REGION_DB_URL only to the seed scripts (answers.env/env), so no DSN of any mode can land in tfstate. Remaining tfstate exposure (hashicorp mode only — the cloud-native store mode has no AppRole and no secret_ids at all): the Vault AppRole secret_id values (vault_secret_id/region_vault_secret_id) still pass through as Terraform variables into the delivery secret on every cloud (aws_ssm_parameter.*.value / google_secret_manager_secret_version / azurerm_key_vault_secret), so they land in tfstate even though instances read them from the store, not user_data. Full removal needs those secret_ids delivered without ever being a Terraform value (e.g. response-wrapped and pushed to SSM out-of-band by the seed step, not via a TF var) — that changes the region/appserv AppRole hookup flow. backend.tf.sample documents SSE-KMS + DynamoDB lock + versioning."
  - id: db-install-error-swallow
    severity: medium
    status: resolved
    note: "db install in the cloud-inits is wrapped in a bounded retry (was a bare `|| true`); a real failure stops boot after retries, so migration errors are not masked (db install stays lock-safe + idempotent for concurrent instances)."
  - id: alb-health-matcher
    severity: medium
    status: resolved
    note: "Matcher broadened from 401 to 200-499 (listener-alive, still fails on 5xx). A dedicated unauthenticated /healthz on appserv would be cleaner (servers-side)."
  - id: supply-chain-verify
    severity: high
    status: open-pipeline
    note: "Verify MECHANISM wired: cloud-init downloads the n.sh installer to a file and sha256-verifies it when var.mos_installer_sha256 is set (warns otherwise). The actual digests/signatures must be published per-artifact by the release pipeline; cannot be fabricated here."
  - id: vault-ha
    severity: high
    status: resolved
    note: "RESOLVED BY REMOVAL: this package no longer provisions any Vault node, so there is no self-hosted SPOF to harden. See vault-bsl-posture for the replacement model. DB HA guidance: byo (a managed HA PostgreSQL the operator runs) is the documented production path; provision-rds stays as the simple mode (Multi-AZ in production)."
  - id: vault-bsl-posture
    severity: critical
    status: resolved
    note: "HashiCorp Vault is BSL 1.1; 'embedded' explicitly includes packaging a product so the Licensed Work must be downloaded for it to operate — which is exactly what the removed self-hosted templates did (dnf install vault + the product requires it). Even though the restriction textually applies only to offerings that COMPETE with HashiCorp's paid Vault, the vendor posture is zero reliance on that judgment call: this package NEVER installs or launches Vault. Secret store model per cloud: vault_provider = <cloud> (aws|gcp|azure — RECOMMENDED) uses the platform's native secret store (Secrets Manager / Secret Manager / Key Vault) with instance-identity auth and platform HA, the permission matrix moved from separate Vaults to IAM name-scoping (appserv can never read api-master; region services can never read the appserv secret); vault_provider = hashicorp is byo-details-only (operator supplies the https address + a short-lived bootstrap token; the seed scripts create mounts/policies/AppRole/values via plain API calls — the Go client library the servers use, hashicorp/vault/api, remained MPL-2.0). The seed scripts gained a uniform store layer (kv_get/kv_put) whose name encodings mirror mountos-servers/internal/secrets exactly (mountos/<path>, mountos__<path>, mountos--<path>). Exact per-service secret read/write scopes in the cloud-native IAM policies are conservative supersets pending runtime validation. KNOWN LIMIT: one hub + one region per AWS account+region / GCP project (this package's scope) — a SECOND region in the same account+region would collide on the shared mountos namespace (api-master must stay region-independent); deploy additional regions into their own account/region/project. The seed scripts refuse a hashicorp region Vault at the same address as the hub Vault (one shared mountos/data/* would collapse the permission matrix — no IAM backstop exists there). RUNTIME-PENDING."
  - id: byo-vault-boot
    severity: critical
    status: resolved
    note: "byo (hashicorp) Vault previously could NEVER boot a fleet: every cloud-init's mos-fetch-vault-config.sh blocked on a vault-ca secret nothing published in byo mode, and VAULT_CACERT was set unconditionally (breaking public-CA managed Vaults such as HCP). Now, in all three clouds: vault_ca_pem/region_vault_ca_pem (private-CA byo Vaults) are published by Terraform (SSM param on AWS, Secret Manager on GCP, Key Vault on Azure), public-CA byo Vaults skip the CA fetch entirely (CA source '-' sentinel, no VAULT_CACERT, system CAs verify), and the compute resources carry preconditions so hashicorp mode without vault_addr fails at plan, not at boot (vault_addr must be https://). In cloud-native mode none of this machinery renders at all. verify.sh's seal-status probe honors VAULT_CACERT. RUNTIME-PENDING."
  - id: blockserv-env-key
    severity: critical
    status: resolved
    note: "block cloud-init set STORAGE_MOUNT_PATH, but blockserv requires STORAGE_MOUNT_ROOT_PATH (internal/config/blockserv.go panics without it) — every blockserv member crash-looped at boot. Key corrected in all three clouds. RUNTIME-PENDING."
  - id: nlb-srpc-health
    severity: high
    status: resolved
    note: "AWS: NLB health checks reach instance targets from the NLB nodes' own IPs, which no SG-to-SG rule matches — every SRPC target registered permanently unhealthy (NLB fail-open masked it for data traffic, and the nlb-unhealthy-hosts alarm would have been stuck firing). Added a vpc_cidr 9443 allow for health checks (SRPC is Noise/Ed25519-authenticated) and enabled cross-zone load balancing (appserv_count 2 < 3 AZs would otherwise blackhole the empty AZ's NLB IP). Also removed the dead 443-from-client_cidr rule on the appserv instance SG (clients terminate at the ALB). GCP/Azure verified NOT affected: GCP's firewall already admits Google's health-check ranges (130.211.0.0/22 + 35.191.0.0/16) on 8443/9443, Azure's NSGs keep the default AllowAzureLoadBalancerInBound (168.63.129.16) with no custom deny, and Azure's internal Standard LB is zone-redundant by default — documented with comments in each cloud. RUNTIME-PENDING (AWS)."
  - id: azure-region-kv-width
    severity: medium
    status: partial
    note: "Azure-only parity gap in the cloud-native matrix: Azure RBAC cannot scope to secret NAME PATTERNS and a service reads exactly one Key Vault URL, so the dynamic s3creds/volcreds names force vault-scoped grants on the region KV — read-only workers (blockserv/gateways) can therefore also read the static region secrets (api-master, dataserv/gcserv signing keys and mountos_data DSN), which AWS name-prefix ARNs and GCP prefix-conditioned IAM both deny. Cross-scope rules still hold (hub secrets + raw DB passwords are in the hub KV, unreachable by region identities; the region DB password was relocated there for exactly this reason). Documented in region-iam.tf with a tightening option once runtime validation shows whether workers read s3creds directly."
  - id: byo-db-hygiene
    severity: medium
    status: resolved
    note: "Seed scripts now fail closed on a byo postgresql DSN without sslmode= (override: {ADMIN,REGION}_DB_ALLOW_PLAINTEXT=1), accept ADMIN_DB_PROVIDER/REGION_DB_PROVIDER refinements (aurora-postgresql, alloydb, ...), and stop assuming the region DB shares the admin DB's dialect/version (REGION_DB_DIALECT/REGION_DB_PROVIDER_VERSION, defaulting to the admin values). Provisioned-mode password handoff is now uniform across clouds: the GCP/Azure DSN outputs were removed (matching AWS's no-DSN-in-terraform posture) and the seed scripts fetch the password natively per cloud — ADMIN/REGION_DB_SECRET_ARN (AWS Secrets Manager), ADMIN/REGION_DB_PASSWORD_SECRET (GCP Secret Manager via gcloud), ADMIN/REGION_DB_SECRET_ID (Azure Key Vault via az). GCP/Azure retain the documented random_password-in-tfstate parity gap."
